<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=black" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thomas Jensen</title>
    <meta
      name="description"
      content="Thomas Jensen — Rust developer focused on systems, native tooling, and open source."
    />
    <script>
      (function () {
        var d = document.documentElement;
        var t = 'dark';
        try {
          var s = localStorage.getItem('theme');
          if (s === 'light' || s === 'dark') t = s;
        } catch (_) {}
        if (t === 'dark') {
          d.classList.add('dark');
          d.style.backgroundColor = 'hsl(222 18% 9%)';
          d.style.colorScheme = 'dark';
        } else {
          d.classList.remove('dark');
          d.style.backgroundColor = 'hsl(42 27% 97%)';
          d.style.colorScheme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
