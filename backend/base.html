<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="%%DESC%%" />
    <meta name="robots" content="index, follow" />

    <link
      rel="preload"
      href="/static/fonts/alef-400.ttf"
      as="font"
      type="font/ttf"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/static/fonts/alef-700.ttf"
      as="font"
      type="font/ttf"
      crossorigin="anonymous"
    />
    <title>Thomas Jensen</title>
    <script>
      (function () {
        var d = document.documentElement,
          t = 'dark';
        try {
          var s = localStorage.getItem('theme');
          if (s === 'light' || s === 'dark') t = s;
        } catch (_) {}
        if (t === 'dark') {
          d.classList.add('dark');
          d.style.backgroundColor = 'hsl(220 15% 8%)';
          d.style.colorScheme = 'dark';
        } else {
          d.classList.remove('dark');
          d.style.backgroundColor = 'hsl(0 0% 99%)';
          d.style.colorScheme = 'light';
        }
      })();
    </script>
    <script>
      (function () {
        var d = document.documentElement;
        try {
          var l = localStorage.getItem('locale');
          if (l === 'en' || l === 'no') {
            d.dataset.locale = l;
            return;
          }
          var lang = navigator.language.toLowerCase();
          d.dataset.locale =
            lang === 'no' ||
            lang.startsWith('no-') ||
            lang === 'nb' ||
            lang.startsWith('nb-') ||
            lang === 'nn' ||
            lang.startsWith('nn-')
              ? 'no'
              : 'en';
        } catch (_) {
          d.dataset.locale = 'en';
        }
      })();
    </script>
    <link rel="preload" href="/assets/index.css" as="style" />
    <link rel="stylesheet" href="/assets/index.css" />
  </head>
  <body>
    <main class="site-layout">
      %%HEADER%%
      <div class="site-page-content">
        <div id="app" style="flex: 1">%%APP%%</div>
        %%FOOTER%%
      </div>
    </main>
    <script type="module" src="/assets/index.js"></script>
  </body>
</html>
